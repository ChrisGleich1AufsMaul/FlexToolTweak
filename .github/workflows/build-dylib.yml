name: Build FlexTool dylib

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          set -euo pipefail
          if [ -e "$THEOS" ] && [ ! -d "$THEOS" ]; then
            rm -f "$THEOS"
          fi
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos "$THEOS"
          fi
          echo "THEOS=$THEOS" >> "$GITHUB_ENV"

      - name: Prepare FLEX sources
        run: |
          mkdir -p temp
          find FLEX -type f -name '*.h' -exec cp {} temp \;
          find FLEX -type f -name '*.m' -exec cp {} temp \;

      - name: Build tweak
        run: make clean package FINALPACKAGE=1

      - name: Collect dylib artifact
        run: |
          mkdir -p artifacts
          find .theos/obj -type f -name '*.dylib' -exec cp {} artifacts/ \;
          ls -la artifacts

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlexTool-dylib
          path: artifacts/*.dylib
          if-no-files-found: error
