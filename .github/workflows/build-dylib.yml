name: Build FlexTool dylib

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          set -euo pipefail
          THEOS_DIR="${RUNNER_TEMP:-/tmp}/theos"
          rm -rf "$THEOS_DIR"
          git clone --recursive https://github.com/theos/theos "$THEOS_DIR"
          echo "THEOS=$THEOS_DIR" >> "$GITHUB_ENV"


      - name: Install iOS SDKs for Theos
        run: |
          set -euo pipefail
          rm -rf "$THEOS/sdks"
          git clone --depth 1 https://github.com/theos/sdks "$THEOS/sdks"

      - name: Prepare FLEX sources
        run: |
          mkdir -p temp
          find FLEX -type f -name '*.h' -exec cp {} temp \;
          find FLEX -type f -name '*.m' -exec cp {} temp \;

      - name: Build tweak
        run: make clean package FINALPACKAGE=1

      - name: Collect dylib artifact
        run: |
          mkdir -p artifacts
          find .theos/obj -type f -name '*.dylib' -exec cp {} artifacts/ \;
          ls -la artifacts

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlexTool-dylib
          path: artifacts/*.dylib
          if-no-files-found: error
