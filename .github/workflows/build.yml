name: Build FlexTool

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Rootless .deb + LiveContainer .dylib
    runs-on: macos-14

    steps:

      # ─────────────────────────────────────────
      # 1. Repository auschecken
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ─────────────────────────────────────────
      # 2. Abhängigkeiten installieren
      # ─────────────────────────────────────────
      - name: Install dependencies
        run: |
          brew install ldid make xz

      # ─────────────────────────────────────────
      # 3. Theos einrichten
      # ─────────────────────────────────────────
      - name: Set up Theos
        run: |
          git clone --recursive --depth=1 \
            https://github.com/theos/theos.git \
            $HOME/theos
          git -C $HOME/theos submodule update --init --recursive
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV
          echo "── dm.pl prüfen ──"
          ls $HOME/theos/vendor/dm.pl/

      # ─────────────────────────────────────────
      # 5. FLEX Submodul sicherstellen
      # ─────────────────────────────────────────
      - name: Ensure FLEX submodule
        run: |
          if [ ! -d "vendor/FLEX/Classes" ]; then
            git submodule update --init --recursive
          fi

      # ─────────────────────────────────────────
      # 6. Theos SDKs herunterladen
      # ─────────────────────────────────────────
      - name: Download Theos SDKs
        run: |
          rm -rf $HOME/theos/sdks
          git clone --depth=1 \
            https://github.com/theos/sdks.git \
            $HOME/theos/sdks

      # ─────────────────────────────────────────
      # 7. Rootless .deb bauen
      # ─────────────────────────────────────────
      - name: Build rootless .deb
        run: |
          make package \
            FINALPACKAGE=1 \
            THEOS_PACKAGE_SCHEME=rootless \
            ARCHS="arm64 arm64e"

      # ─────────────────────────────────────────
      # 8. LiveContainer .dylib bauen
      # ─────────────────────────────────────────
      - name: Build LiveContainer .dylib
        run: |
          make FlexToolLC \
            THEOS_PACKAGE_SCHEME=rootless \
            ARCHS="arm64 arm64e"
            
      # ─────────────────────────────────────────
      # 9. Artefakte hochladen
      # ─────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flextool-${{ github.sha }}
          path: output/
          retention-days: 30

      # ─────────────────────────────────────────
      # 10. Release erstellen (nur bei Tags)
      # ─────────────────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}